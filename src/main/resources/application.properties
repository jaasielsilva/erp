spring.application.name=erp

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/erp_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Security default seed (change in production)
app.seed.super-admin.name=${SEED_SUPER_ADMIN_NAME:Platform Owner}
app.seed.super-admin.email=${SEED_SUPER_ADMIN_EMAIL:owner@erp.local}
app.seed.super-admin.password=${SEED_SUPER_ADMIN_PASSWORD:Admin@123}
app.security.remember-me.key=${APP_REMEMBER_ME_KEY:erp-remember-key-change-in-prod}

# Reset de senha: em false (padrão / produção) não exibe senha nem token na UI nem retorna na API.
# Apenas true em desenvolvimento local (ex.: EXPOSE_PASSWORD_RESET_CREDENTIALS=true).
app.security.expose-password-reset-credentials=${EXPOSE_PASSWORD_RESET_CREDENTIALS:false}

# Cifra de segredos de e-mail (senha SMTP). Em producao use variavel longa e unica.
app.secrets.credential-encryption-key=${APP_SECRETS_CREDENTIAL_ENCRYPTION_KEY:DEFINA_APP_SECRETS_CREDENTIAL_ENCRYPTION_KEY_32+}

# URL pública (sem / final) para link de login no corpo do e-mail. Ex: https://erp.empresa.com
app.web.public-base-url=${APP_PUBLIC_BASE_URL:}

# E-mail apos reset por admin (SMTP Gmail + credenciais do tenant)
app.mail.send-on-admin-password-reset=${APP_MAIL_SEND_ON_ADMIN_PASSWORD_RESET:true}
# Em produção costuma ser false: não repete a senha temporária no e-mail
app.mail.include-temporary-password-in-body=${APP_MAIL_INCLUDE_TEMP_PASSWORD_IN_EMAIL:false}

# RabbitMQ (mensageria assíncrona)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=${APP_MESSAGING_EMAIL_MAX_ATTEMPTS:4}
spring.rabbitmq.listener.simple.retry.initial-interval=${APP_MESSAGING_EMAIL_INITIAL_INTERVAL_MS:2000}
spring.rabbitmq.listener.simple.retry.multiplier=${APP_MESSAGING_EMAIL_MULTIPLIER:2.0}
spring.rabbitmq.listener.simple.retry.max-interval=${APP_MESSAGING_EMAIL_MAX_INTERVAL_MS:15000}

# Filas de e-mail transacional
app.messaging.email.exchange=${APP_MESSAGING_EMAIL_EXCHANGE:erp.email.exchange}
app.messaging.email.routing-key=${APP_MESSAGING_EMAIL_ROUTING_KEY:email.password-reset}
app.messaging.email.queue=${APP_MESSAGING_EMAIL_QUEUE:erp.email.password-reset.queue}
app.messaging.email.dlq=${APP_MESSAGING_EMAIL_DLQ:erp.email.password-reset.dlq}
app.messaging.email.max-attempts=${APP_MESSAGING_EMAIL_MAX_ATTEMPTS:4}
app.messaging.email.initial-interval-ms=${APP_MESSAGING_EMAIL_INITIAL_INTERVAL_MS:2000}
app.messaging.email.multiplier=${APP_MESSAGING_EMAIL_MULTIPLIER:2.0}
app.messaging.email.max-interval-ms=${APP_MESSAGING_EMAIL_MAX_INTERVAL_MS:15000}
