<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso negado | ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="card mx-auto" style="max-width: 620px;">
        <div class="card-body p-4 p-md-5 text-center">
            <h1 class="h4 text-danger mb-3">Acesso negado</h1>
            <p class="text-muted mb-4" th:text="${message} ?: 'Você não possui permissão para acessar este recurso.'">
                Você não possui permissão para acessar este recurso.
            </p>
            <a class="btn btn-primary" th:href="@{/dashboard}">Voltar ao dashboard</a>
        </div>
    </div>
</main>
</body>
</html>
