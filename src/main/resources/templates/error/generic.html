<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro de negócio | ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="card mx-auto" style="max-width: 620px;">
        <div class="card-body p-4 p-md-5">
            <h1 class="h4 mb-3">Não foi possível concluir a operação</h1>
            <p class="text-muted mb-4" th:text="${message} ?: 'Revise os dados e tente novamente.'">
                Revise os dados e tente novamente.
            </p>
            <div class="d-flex gap-2">
                <a class="btn btn-primary" th:href="@{/dashboard}">Dashboard</a>
                <a class="btn btn-outline-secondary" th:href="@{/usuarios}">Voltar para usuários</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
