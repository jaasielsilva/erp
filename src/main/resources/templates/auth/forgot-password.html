<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Esqueci minha senha | ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-2">Esqueci minha senha</h1>
                    <p class="text-secondary small mb-4">
                        Informe o e-mail usado no acesso. Se a conta estiver ativa, enviaremos um link para redefinicao de senha.
                    </p>

                    <div class="alert alert-info" th:if="${infoMessage}" th:text="${infoMessage}">
                        Se o e-mail informado estiver cadastrado e ativo, voce recebera instrucoes para redefinir sua senha.
                    </div>

                    <form th:action="@{/esqueci-senha}" th:object="${forgotPasswordForm}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label" for="email">E-mail</label>
                            <input id="email" type="email" class="form-control" th:field="*{email}" autocomplete="email" placeholder="seuemail@empresa.com">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Enviar link de redefinicao</button>
                            <a th:href="@{/login}" class="btn btn-outline-secondary">Voltar para login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
