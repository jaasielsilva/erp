<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar senha | ERP Corporativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #0b1120, #111827);
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            color: #0f172a;
            padding: 16px;
        }

        .password-card {
            width: 100%;
            max-width: 520px;
            border-radius: 16px;
            border: 1px solid #dbe3f0;
            box-shadow: 0 22px 45px rgba(2, 8, 23, 0.35);
        }

        .password-card .card-header {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }
    </style>
</head>
<body>
<section class="card password-card">
    <div class="card-header py-3 px-4">
        <h1 class="h5 mb-1">Troca obrigatoria de senha</h1>
        <p class="text-muted mb-0 small">
            Por seguranca, altere sua senha temporaria antes de continuar.
        </p>
    </div>
    <div class="card-body p-4">
        <p class="small text-muted mb-3">
            Usuario autenticado: <strong th:text="${email}">email</strong>
        </p>

        <form th:action="@{/minha-conta/alterar-senha}" th:object="${passwordForm}" method="post" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="col-12">
                <div class="alert alert-danger py-2 mb-0" role="alert" th:if="${#fields.hasGlobalErrors()}">
                    <div th:each="error : ${#fields.globalErrors()}" th:text="${error}">Erro</div>
                </div>
            </div>
            <div class="col-12">
                <label class="form-label" for="currentPassword">Senha atual</label>
                <input id="currentPassword" type="password" class="form-control" th:field="*{currentPassword}" autocomplete="current-password">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
            </div>

            <div class="col-12">
                <label class="form-label" for="newPassword">Nova senha</label>
                <input id="newPassword" type="password" class="form-control" th:field="*{newPassword}" autocomplete="new-password">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>

            <div class="col-12">
                <label class="form-label" for="confirmPassword">Confirmar nova senha</label>
                <input id="confirmPassword" type="password" class="form-control" th:field="*{confirmPassword}" autocomplete="new-password">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-shield-lock me-1"></i>Salvar nova senha
                </button>
                <button type="submit" form="logoutForm" class="btn btn-outline-secondary">Sair</button>
            </div>
        </form>
        <form id="logoutForm" th:action="@{/logout}" method="post" class="d-none">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        </form>
    </div>
</section>
</body>
</html>
